server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: zone-service
          uri: lb://zone-management-service
          predicates:
            - Path=/api/zones/**
        - id: sensor-service
          uri: lb://sensor-telemetry-service
          predicates:
            - Path=/api/sensors/**
        - id: automation-service
          uri: lb://automation-control-service
          predicates:
            - Path=/api/automation/**
        - id: crop-service
          uri: lb://crop-inventory-service
          predicates:
            - Path=/api/crops/**
